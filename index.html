<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul de Bianchi - Comodidad y Deporte</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
</head>
<body>
    <header>
        <nav class="navbar">
    <h1 class="logo">Paul de Bianchi</h1>
    
    <div id="auth-controls">
        <span id="user-welcome" class="welcome-text" style="margin-right: 15px; font-weight: bold; color: white;"></span>
        <button id="login-btn" class="btn-auth">Ingresar</button>
        <button id="logout-btn" class="btn-auth hidden">Salir</button>
    </div>
</nav>
    </header>

    <main class="container">
        <section id="tienda">
            <h2 class="section-title">Catálogo Deportivo</h2>
            <div id="productos-grid" class="grid">
                </div>
        </section>

        <section id="carrito-seccion" class="cart-card">
            <h2>Mi Carrito</h2>
            <div id="items-carrito"></div>
            <p id="total-compra" class="total">Total: $0</p>
        </section>

        <section id="pago-seccion" class="hidden">
            <h2>Datos de Despacho</h2>
            <form id="form-pago">
                <input type="text" id="nombre" placeholder="Nombre completo" required>
                <input type="text" id="direccion" placeholder="Dirección de domicilio" required>
                <input type="email" id="correo" placeholder="Email (ejemplo@mail.com)" required>
                <input type="tel" id="telefono" placeholder="Teléfono (9 dígitos)" required>
                <button type="submit" class="btn-success">Confirmar y Pagar</button>
            </form>
        </section>
    </main>

    <script src="java/auth.js"></script>
    <script src="java/cart.js"></script>
</body>
</html>
